<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finding Opportunities — Demand Signal</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .loading-wrap { text-align: center; padding: 4rem 2rem; }
    .spinner {
      width: 56px; height: 56px;
      border: 5px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg { color: #94a3b8; font-size: 1rem; margin-top: 1rem; }
    .step-list { list-style: none; text-align: left; display: inline-block; margin-top: 2rem; }
    .step-list li { padding: 0.4rem 0; color: #64748b; font-size: 0.9rem; }
    .step-list li.active { color: #a5b4fc; font-weight: 600; }
    .step-list li.done { color: #4ade80; }
    .step-list li::before { content: "○ "; }
    .step-list li.active::before { content: "● "; }
    .step-list li.done::before { content: "✓ "; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>demand<span>signal</span></h1></header>
    <main class="loading-wrap">
      <div class="spinner" id="spinner"></div>
      <h2>Scanning for real pain signals…</h2>
      <p class="status-msg" id="status-msg">Searching Reddit for prospects who match your ICP</p>
      <ul class="step-list" id="steps">
        <li class="done">ICP extracted for <strong>{{ domain }}</strong></li>
        <li class="active" id="step-scan">Scanning Reddit with Apify</li>
        <li id="step-rank">Ranking &amp; scoring top opportunities</li>
        <li id="step-draft">Drafting outreach messages</li>
      </ul>
    </main>
  </div>

  <script>
    const SESSION_ID = "{{ session_id }}";
    let elapsed = 0;
    const msgs = [
      "Searching Reddit for prospects who match your ICP",
      "Running Apify Reddit actor — pulling real pain posts…",
      "Filtering relevant signals from subreddits…",
      "Sending top signals to AI for ranking…",
      "Generating personalized outreach variants…",
      "Almost there — building your opportunity cards…",
    ];

    const statusEl = document.getElementById("status-msg");
    const stepScan = document.getElementById("step-scan");
    const stepRank = document.getElementById("step-rank");
    const stepDraft = document.getElementById("step-draft");

    async function poll() {
      try {
        const resp = await fetch(`/status/${SESSION_ID}`);
        const data = await resp.json();

        if (elapsed > 30) {
          stepScan.className = "done";
          stepRank.className = "active";
        }
        if (elapsed > 60) {
          stepRank.className = "done";
          stepDraft.className = "active";
        }

        statusEl.textContent = msgs[Math.min(Math.floor(elapsed / 15), msgs.length - 1)];

        if (data.status === "done") {
          statusEl.textContent = "Done! Loading your cards…";
          window.location.href = `/results/${SESSION_ID}`;
          return;
        }
        if (data.status === "error") {
          document.getElementById("spinner").style.display = "none";
          statusEl.textContent = "Something went wrong.";
          window.location.href = `/results/${SESSION_ID}`;
          return;
        }
      } catch (e) {
        // network blip — keep polling
      }
      elapsed += 4;
      setTimeout(poll, 4000);
    }

    setTimeout(poll, 4000);
  </script>
</body>
</html>
